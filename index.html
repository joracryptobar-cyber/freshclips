<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram Канал</title>
    <style>
        /* Темная тема с зелеными акцентами */
        :root { 
            --bg-color: #0a0a0c;       
            --card-bg: #222226;        
            --text-main: #ffffff; 
            --text-muted: #93939a; 
            --btn-green: #8cc63f;      
            --btn-green-hover: #7ab32f;
            --accent: #8cc63f;         
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* ======= БЛОК ПРОФИЛЯ (ШАПКА) ======= */
        .profile-header {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 2px solid var(--accent); 
        }

        /* Картинка для ПК */
        .cover-image {
            width: 100%;
            height: 320px; 
            background-color: #000000;
            background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&c_uniq_tag=NWFmbEvYJ29Sw7iJDXKRKD8AWpt3hJgpwRq95Whq6Go&type=cover_group');
            background-size: cover; 
            background-position: center 100%; 
            background-repeat: no-repeat;
        }

        .profile-info {
            padding: 15px 30px 25px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
        }

        .avatar-container { margin-top: -65px; position: relative; }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--card-bg); 
            background-color: #fff;
            object-fit: cover;
        }

        .profile-details { flex-grow: 1; margin-top: 5px; }
        .profile-details h1 { margin: 0; font-size: 26px; font-weight: 600; letter-spacing: 0.5px; }
        .profile-details p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; display: flex; align-items: center; gap: 5px; }

        .profile-actions { display: flex; gap: 12px; margin-top: 10px; }

        .btn {
            padding: 10px 24px;
            border-radius: 25px; 
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            color: #111; 
            border: none;
            cursor: pointer;
            
            /* Делаем кнопку контейнером для иконки и текста */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; /* Расстояние между иконкой и текстом */
        }

        .btn-primary, .btn-secondary { background-color: var(--btn-green); }
        .btn-primary:hover, .btn-secondary:hover { 
            background-color: var(--btn-green-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 10px rgba(140, 198, 63, 0.3);
        }

        /* ======= ПОИСК ======= */
        .search-container {
            margin-bottom: 30px;
        }

        #search-input {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #search-input::placeholder { color: var(--text-muted); }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(140, 198, 63, 0.2);
        }

        /* ======= СЕТКА КЛИПОВ ======= */
        .section-title { font-size: 20px; margin-bottom: 20px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .clip-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; transition: transform 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .clip-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: rgba(140, 198, 63, 0.3); }
        
        .clip-preview { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background-color: #1a1a1f; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .play-btn { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; backdrop-filter: blur(4px); transition: all 0.2s; border: 2px solid transparent; }
        .clip-card:hover .play-btn { background: var(--accent); transform: scale(1.1); border-color: #fff; }
        .clip-info { padding: 12px 15px; }
        .clip-info h3 { margin: 0; font-size: 14px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; color: #e1e1e3; }
        
        .loading, .no-results { text-align: center; padding: 50px; color: var(--text-muted); grid-column: 1 / -1; }

        .load-more-container { text-align: center; margin-top: 40px; margin-bottom: 20px; }
        .btn-load-more { display: none; margin: 0 auto; background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--accent); padding: 12px 40px; }
        .btn-load-more:hover { background-color: rgba(140, 198, 63, 0.1); color: var(--btn-green); }

        /* ======= АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ ======= */
        @media (max-width: 768px) {
            .cover-image { 
                height: 120px; 
                background-image: url('mobile_cover.png');
                background-size: cover; 
                background-position: center; 
            }
            
            .profile-info { 
                display: grid;
                grid-template-columns: 1fr auto; 
                grid-template-areas: 
                    "avatar ."
                    "details actions";
                align-items: end; 
                padding: 10px 15px 15px; 
                gap: 5px 15px; 
            }
            
            .avatar-container { grid-area: avatar; margin-top: -45px; } 
            .avatar { width: 75px; height: 75px; border-width: 3px; } 
            
            .profile-details { grid-area: details; margin-top: 0; padding-bottom: 2px; } 
            .profile-details h1 { font-size: 21px; } 
            .profile-details p { font-size: 12px; margin-top: 2px; }
            
            .profile-actions { 
                grid-area: actions;
                flex-direction: column; 
                width: 145px; 
                gap: 8px; 
                margin-top: 0; 
                justify-self: end; 
            }
            .btn { 
                width: 100%; 
                text-align: center; 
                box-sizing: border-box; 
                padding: 7px 10px; 
                font-size: 11px; 
                white-space: nowrap; 
                gap: 6px; /* Чуть уменьшаем отступ между иконкой и текстом на телефоне */
            }
            
            /* Уменьшаем сами иконки для мобилки */
            .btn svg {
                width: 14px;
                height: 14px;
            }

            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .clip-info { padding: 8px 10px; }
            .clip-info h3 { font-size: 12px; }
            .play-btn { width: 36px; height: 36px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="profile-header">
            <div class="cover-image"></div>
            <div class="profile-info">
                <div class="avatar-container">
                    <img src="https://sun23-2.userapi.com/s/v1/ig1/gtuT6ql_Nf9himHpi7tbG0_GbtHlDBzh9WKOg06R07X-1PiFxFI3iRRDn79LnBuwl9uu9Kme.jpg?quality=96&crop=10,0,389,389&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360&ava=1&u=0V8f65eTfV6c6u5lnff4KaBA7t7Dl8e-D_O4z3HU3EUg&cs=100x100" alt="Аватарка" class="avatar">
                </div>
                <div class="profile-details">
                    <h1>Свежие Клипы</h1>
                    <p>✓ Канал в Telegram</p>
                </div>
                <div class="profile-actions">
                    <a href="https://t.me/fresh_clips" target="_blank" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.94z"/>
                        </svg>
                        Наш телеграм канал
                    </a>
                    <a href="https://vk.com/fresh_clips" target="_blank" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                            <path d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14C20.67 22 22 20.67 22 15.07V8.93C22 3.33 20.67 2 15.07 2zm2.6 13.92h-1.37c-.63 0-.81-.5-1.93-1.64-1-.98-1.4-1.12-1.68-1.12-.38 0-.5.12-.5.71v1.39c0 .42-.13.66-1.33.66-1.96 0-4.08-1.19-5.53-3.29C4.05 10.74 3.68 8.65 3.68 8.27c0-.21.09-.36.42-.36h1.37c.3 0 .42.15.53.44.75 2.12 1.95 3.9 2.47 3.9.21 0 .31-.1.31-.62V9.38c-.05-.8-.37-1.16-1.02-1.25-.26-.04-.15-.31.07-.46.33-.23.94-.25 1.5-.25.75 0 1 .05 1.2.14.31.14.38.46.38 1.48v1.84c0 .35.15.48.27.48.24 0 .47-.13.98-.63 1.13-1.17 1.93-3.3 1.93-3.3.09-.27.28-.42.58-.42h1.37c.43 0 .54.21.45.5-.23.82-1.65 2.76-2.12 3.37-.36.45-.48.62 0 1.25 1.18 1.52 2.15 2.56 2.5 3.14.16.27.02.66-.41.66z"/>
                        </svg>
                        Мы в VK
                    </a>
                </div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Поиск по названию клипа...">
        </div>

        <h2 class="section-title">
            Новые клипы
            <span id="results-count" style="font-size: 14px; font-weight: normal; color: var(--text-muted);"></span>
        </h2>
        
        <div class="grid" id="clips-grid">
            <div class="loading" id="loader">Загрузка свежих клипов...</div>
        </div>

        <div class="load-more-container">
            <button class="btn btn-load-more" id="load-more-btn" onclick="renderNextClips()">Показать ещё</button>
        </div>

    </div>

    <script>
        let allClipsData = [];       
        let filteredClipsData = [];  
        let currentDisplayed = 0;    
        const CLIPS_PER_PAGE = 12;   

        async function loadClips() {
            try {
                const response = await fetch('clips.json?' + new Date().getTime());
                allClipsData = await response.json();
                
                filteredClipsData = allClipsData;
                
                document.getElementById('loader').style.display = 'none';
                renderNextClips();
            } catch (error) {
                console.error('Ошибка загрузки клипов:', error);
                document.getElementById('loader').innerText = 'Зайдите в Telegram, чтобы посмотреть новые клипы!';
            }
        }

        function renderNextClips() {
            const grid = document.getElementById('clips-grid');
            const loadMoreBtn = document.getElementById('load-more-btn');
            const resultsCount = document.getElementById('results-count');
            
            if (filteredClipsData.length === 0) {
                grid.innerHTML = '<div class="no-results">По вашему запросу ничего не найдено 😔</div>';
                loadMoreBtn.style.display = 'none';
                resultsCount.innerText = '0 видео';
                return;
            }

            resultsCount.innerText = `${filteredClipsData.length} видео`;

            const nextBatch = filteredClipsData.slice(currentDisplayed, currentDisplayed + CLIPS_PER_PAGE);
            
            nextBatch.forEach(clip => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.innerHTML = `
                    <a href="${clip.url}" target="_blank" style="text-decoration: none;">
                        <div class="clip-preview" style="background-image: url('${clip.image}');">
                            <div class="play-btn">▶</div>
                        </div>
                    </a>
                    <div class="clip-info">
                        <h3>${clip.title}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });

            currentDisplayed += nextBatch.length;

            if (currentDisplayed >= filteredClipsData.length) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'inline-block';
            }
        }

        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            filteredClipsData = allClipsData.filter(clip => 
                clip.title.toLowerCase().includes(query)
            );
            
            document.getElementById('clips-grid').innerHTML = '';
            currentDisplayed = 0;
            
            renderNextClips();
        });

        loadClips();
    </script>
</body>
</html>
