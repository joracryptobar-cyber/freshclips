<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram и ВКонтакте</title>
    <style>
        :root { --bg-color: #0a0a0c; --card-bg: #222226; --text-main: #ffffff; --text-muted: #93939a; --btn-green: #8cc63f; --btn-green-hover: #7ab32f; --accent: #8cc63f; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        .main-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 15px; min-height: 100vh; display: flex; flex-direction: column; }
        /* ...ОСТАЛЬНЫЕ СТИЛИ ТЕ ЖЕ... */
        .profile-header { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; border: 2px solid var(--accent); }
        .cover-image { width: 100%; height: 320px; background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&type=cover_group'); background-size: cover; background-position: center 100%; }
        .profile-info { padding: 15px 30px 25px; display: flex; align-items: center; flex-wrap: wrap; gap: 20px; position: relative; }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--card-bg); background-color: #fff; object-fit: cover; }
        .btn { padding: 10px 24px; border-radius: 25px; text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s; color: #111; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background-color: var(--btn-green); }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 8px; border-radius: 30px; }
        .tab-btn { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #111; }
        .sticky-control-panel { position: sticky; top: 0; z-index: 100; background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(15px); padding: 15px 0 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .search-sort-row { display: flex; gap: 12px; margin-bottom: 15px; }
        #search-input { flex-grow: 1; padding: 14px 20px; border-radius: 25px; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; }
        .sort-select { padding: 14px 20px; border-radius: 25px; background: var(--card-bg); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .clip-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .clip-preview { width: 100%; aspect-ratio: 16 / 9; position: relative; }
        .lazy-image { width: 100%; height: 100%; object-fit: cover; }
        .clip-info { padding: 12px 15px; }
        .meta-info { display: flex; justify-content: space-between; font-size: 11px; color: #66666e; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal-content { width: 90%; max-width: 900px; aspect-ratio: 16 / 9; }
        .modal-iframe { width: 100%; height: 100%; border: none; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } .profile-actions { display: none; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="profile-header"><div class="cover-image"></div><div class="profile-info"><h1>Свежие Клипы</h1></div></div>
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-tg" onclick="switchTab('tg')">Клипы Telegram</button>
            <button class="tab-btn" id="tab-vk" onclick="switchTab('vk')">VK Видео</button>
        </div>
        <div class="sticky-control-panel">
            <div class="search-sort-row">
                <input type="text" id="search-input" placeholder="Поиск...">
                <select id="sort-select" class="sort-select" onchange="applyFilters()">
                    <option value="newest">⏱ Сначала новые</option>
                    <option value="popular">🔥 Популярные</option>
                </select>
            </div>
            <div class="filters-scroll-area" id="month-filters"></div>
        </div>
        <div class="grid" id="clips-grid"></div>
        <div id="scroll-sentinel" style="height: 50px;"></div>
    </div>

    <div id="video-modal" class="modal-overlay" onclick="closePlayer(event)">
        <div class="modal-content"><iframe id="modal-iframe" class="modal-iframe" src="" allowfullscreen></iframe></div>
    </div>

    <script>
        let tgData = [], vkData = [], currentActiveData = [], filteredClipsData = [];
        let currentDisplayed = 0, activeTab = 'tg', activeMonth = null;
        const CLIPS_PER_PAGE = 12;
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        const observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) renderNextClips(); }, { rootMargin: "200px" });

        async function loadAllData() {
            const buster = Date.now();
            try {
                const rTg = await fetch('clips.json?v=' + buster); if(rTg.ok) tgData = await rTg.json();
                const rVk = await fetch('vk_clips.json?v=' + buster); if(rVk.ok) vkData = await rVk.json();
                switchTab('tg');
                observer.observe(document.getElementById('scroll-sentinel'));
            } catch (e) { console.error(e); }
        }

        function switchTab(tabId) {
            activeTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            currentActiveData = (tabId === 'tg') ? tgData : vkData;
            buildFiltersUi();
            applyFilters();
        }

        function buildFiltersUi() {
            const monthSet = new Set();
            currentActiveData.forEach(clip => {
                if (clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    if (!isNaN(d.getTime())) {
                        const mStr = `${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}`;
                        monthSet.add(mStr);
                    }
                }
            });
            const container = document.getElementById('month-filters');
            container.innerHTML = '<div class="filter-chip active" onclick="setMonthFilter(null)">📅 Все месяцы</div>';
            Array.from(monthSet).sort().reverse().forEach(m => {
                const [y, mi] = m.split('-');
                container.innerHTML += `<div class="filter-chip" onclick="setMonthFilter('${m}')">${monthNames[parseInt(mi)]} ${y}</div>`;
            });
        }

        function setMonthFilter(m) { activeMonth = m; applyFilters(); }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;
            
            filteredClipsData = currentActiveData.filter(clip => {
                const matchesSearch = clip.title.toLowerCase().includes(query);
                let matchesMonth = true;
                if (activeMonth && clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    matchesMonth = (`${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}` === activeMonth);
                }
                return matchesSearch && matchesMonth;
            });

            if (sort === 'popular') filteredClipsData.sort((a,b) => parseFloat(b.views) - parseFloat(a.views));
            else filteredClipsData.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            document.getElementById('clips-grid').innerHTML = '';
            currentDisplayed = 0;
            renderNextClips();
        }

        function renderNextClips() {
            const grid = document.getElementById('clips-grid');
            const batch = filteredClipsData.slice(currentDisplayed, currentDisplayed + CLIPS_PER_PAGE);
            
            batch.forEach(clip => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.onclick = () => {
                    const modal = document.getElementById('video-modal');
                    document.getElementById('modal-iframe').src = clip.playerUrl || clip.url;
                    modal.classList.add('show');
                };

                // МАГИЯ ОТОБРАЖЕНИЯ: Приоритет текстовой дате
                let dateDisplay = clip.dateText;
                if (!dateDisplay && clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    dateDisplay = isNaN(d.getTime()) ? clip.timestamp : d.toLocaleDateString('ru-RU');
                }

                card.innerHTML = `
                    <div class="clip-preview"><img src="${clip.image}" class="lazy-image"></div>
                    <div class="clip-info">
                        <h3>${clip.title}</h3>
                        <div class="meta-info">
                            <span>👁 ${clip.views}</span>
                            <span>📅 ${dateDisplay}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            currentDisplayed += batch.length;
        }

        function closePlayer(e) { if(e.target.id === 'video-modal') { document.getElementById('video-modal').classList.remove('show'); document.getElementById('modal-iframe').src = ''; } }
        loadAllData();
    </script>
</body>
</html>
