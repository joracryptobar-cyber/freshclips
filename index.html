<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram Канал</title>
    <style>
        /* Темная тема в стиле современных соцсетей */
        :root { 
            --bg-color: #0a0a0c;       /* Самый темный фон страницы */
            --card-bg: #222226;        /* Цвет плашек и шапки (темно-серый) */
            --text-main: #ffffff; 
            --text-muted: #93939a; 
            --btn-blue: #5181b8;       /* Классический синий цвет кнопок */
            --accent: #ff0050;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* ======= БЛОК ПРОФИЛЯ (ШАПКА) ======= */
        .profile-header {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Фоновая картинка с арбузом */
        .cover-image {
            width: 100%;
            height: 280px;
            background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&c_uniq_tag=NWFmbEvYJ29Sw7iJDXKRKD8AWpt3hJgpwRq95Whq6Go&type=cover_group');
            background-size: cover;
            background-position: center;
        }

        /* Нижняя часть шапки с инфой */
        .profile-info {
            padding: 15px 30px 25px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
        }

        /* Круглая аватарка (сдвинута вверх) */
        .avatar-container {
            margin-top: -65px; 
            position: relative;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--card-bg); /* Рамка цвета фона плашки */
            background-color: #fff;
            object-fit: cover;
            /* Я добавил картинку зеленого яблока для примера. Можете заменить на свою! */
        }

        /* Текст профиля */
        .profile-details {
            flex-grow: 1;
            margin-top: 5px;
        }

        .profile-details h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .profile-details p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Кнопки действий */
        .profile-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--btn-blue);
            color: white;
        }

        .btn-primary:hover { background-color: #5c9ce6; }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .btn-secondary:hover { background-color: rgba(255, 255, 255, 0.15); }

        /* ======= СЕТКА КЛИПОВ ======= */
        .section-title { font-size: 20px; margin-bottom: 20px; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .clip-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; transition: transform 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .clip-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .clip-preview { width: 100%; height: 420px; background-color: #1a1a1f; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .play-btn { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; backdrop-filter: blur(4px); transition: all 0.2s; }
        .clip-card:hover .play-btn { background: var(--accent); transform: scale(1.1); }
        .clip-info { padding: 12px 15px; }
        .clip-info h3 { margin: 0; font-size: 14px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; color: #e1e1e3; }
        
        .loading { text-align: center; padding: 50px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .profile-info { flex-direction: column; align-items: flex-start; text-align: left; }
            .avatar-container { margin-top: -50px; }
            .avatar { width: 100px; height: 100px; }
            .profile-actions { width: 100%; }
            .btn { flex-grow: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="profile-header">
            <div class="cover-image"></div>
            <div class="profile-info">
                
                <div class="avatar-container">
                    <img src="https://images.unsplash.com/photo-1568702846914-96b305d2aaeb?auto=format&fit=crop&w=250&q=80" alt="Аватарка" class="avatar">
                </div>
                
                <div class="profile-details">
                    <h1>Свежие Клипы</h1>
                    <p>✓ Канал в Telegram</p>
                </div>
                
                <div class="profile-actions">
                    <a href="https://t.me/fresh_clips" target="_blank" class="btn btn-primary">Перейти в канал</a>
                    <a href="#" class="btn btn-secondary">Ещё ⌄</a>
                </div>
                
            </div>
        </div>

        <h2 class="section-title">Новые клипы</h2>
        <div class="grid" id="clips-grid">
            <div class="loading">Загрузка свежих клипов...</div>
        </div>

    </div>

    <script>
        async function loadClips() {
            try {
                const response = await fetch('clips.json?' + new Date().getTime());
                const clips = await response.json();
                
                const grid = document.getElementById('clips-grid');
                grid.innerHTML = ''; 

                clips.forEach(clip => {
                    const card = document.createElement('div');
                    card.className = 'clip-card';
                    card.innerHTML = `
                        <a href="${clip.url}" target="_blank" style="text-decoration: none;">
                            <div class="clip-preview" style="background-image: url('${clip.image}');">
                                <div class="play-btn">▶</div>
                            </div>
                        </a>
                        <div class="clip-info">
                            <h3>${clip.title}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Ошибка загрузки клипов:', error);
                document.getElementById('clips-grid').innerHTML = '<div class="loading">Зайдите в Telegram, чтобы посмотреть новые клипы!</div>';
            }
        }
        loadClips();
    </script>
</body>
</html>
