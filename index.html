<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свежие Клипы</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 30px; }
  
  /* Сетка для клипов */
  #clips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  /* Дизайн карточки */
  .clip-card {
    background: #1e1e1e;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    text-decoration: none;
    color: white;
    display: flex;
    flex-direction: column;
  }
  .clip-card:hover { 
    transform: translateY(-5px); 
    box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
  }
  
  /* Обложка видео (превью) */
  .clip-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  
  /* Кнопка Play по центру */
  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    width: 50px; height: 50px;
    display: flex; justify-content: center; align-items: center;
  }
  .play-btn::after {
    content: '';
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 15px solid white;
    margin-left: 5px;
  }
  
  /* Текст под видео */
  .clip-title { 
    padding: 15px; 
    font-size: 16px; 
    font-weight: 600; 
    line-height: 1.4; 
  }
  .loader { text-align: center; font-size: 18px; margin-top: 50px; color: #888; }
</style>
</head>
<body>

<h1>Свежие Клипы</h1>
<div id="loader" class="loader">Загрузка клипов из Telegram... 🕵️‍♂️</div>
<div id="clips-grid"></div>

<script>
  async function loadClips() {
    // Ссылка на публичную веб-версию твоего канала
    const channelUrl = encodeURIComponent('https://t.me/s/fresh_clips');
    // CORS-прокси для обхода блокировок браузера
    const proxyUrl = `https://api.allorigins.win/get?url=${channelUrl}`;
    
    try {
      const response = await fetch(proxyUrl);
      const data = await response.json();
      const parser = new DOMParser();
      const doc = parser.parseFromString(data.contents, 'text/html');
      
      // Ищем все посты
      const messages = doc.querySelectorAll('.tgme_widget_message');
      const grid = document.getElementById('clips-grid');
      document.getElementById('loader').style.display = 'none';

      // Проходим по постам в обратном порядке (сначала новые)
      Array.from(messages).reverse().forEach(msg => {
        // Ищем блок с видео
        const videoThumb = msg.querySelector('.tgme_widget_message_video_thumb');
        
        if (videoThumb) {
          const link = msg.querySelector('.tgme_widget_message_date').href;
          
          // Достаем картинку из background-image
          const style = videoThumb.getAttribute('style');
          const imgMatch = style.match(/url\('([^']+)'\)/);
          const imgUrl = imgMatch ? imgMatch[1] : '';

          // Вытаскиваем название клипа из текста поста
          let text = 'Новый клип';
          const textEl = msg.querySelector('.tgme_widget_message_text');
          if (textEl) {
              // Берем первую строчку и убираем лишнее
              text = textEl.innerText.split('\n')[0].replace('Премьера клипа! ', '');
          }

          // Создаем и добавляем карточку на сайт
          const card = document.createElement('a');
          card.href = link;
          card.target = '_blank';
          card.className = 'clip-card';
          
          card.innerHTML = `
            <div class="clip-thumb" style="background-image: url('${imgUrl}')">
                <div class="play-btn"></div>
            </div>
            <div class="clip-title">${text}</div>
          `;
          grid.appendChild(card);
        }
      });
    } catch (error) {
      document.getElementById('loader').innerText = 'Ошибка синхронизации с Telegram. Попробуйте обновить страницу.';
      console.error(error);
    }
  }

  loadClips();
</script>

</body>
</html>
