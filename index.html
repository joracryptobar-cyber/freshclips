                    const resTg = await fetch('clips.json?v=' + cacheBuster);
                    if(resTg.ok) tgData = await resTg.json();
                } catch(e) { console.error('TG error', e); }

                try {
                    const resVk = await fetch('vk_clips.json?v=' + cacheBuster);
                    if(resVk.ok) vkData = await resVk.json();
                } catch(e) { console.error('VK error', e); }
                
                // Прячем главный лоадер после успешной загрузки данных
                document.getElementById('main-loader-wrapper').style.display = 'none';
                
                switchTab('tg'); 
                observer.observe(document.getElementById('scroll-sentinel'));
                
            } catch (error) {
                const loaderText = document.getElementById('loader-text');
                if (loaderText) loaderText.innerHTML = 'Ошибка загрузки данных.';
                const spinner = document.querySelector('#loader .spinner');
                if (spinner) spinner.style.display = 'none';
            }
        }

        // --- ИСПРАВЛЕННАЯ ФУНКЦИЯ ПЕРЕКЛЮЧЕНИЯ ВКЛАДОК ---
        function switchTab(tabId) {
            activeTab = tabId;
            document.getElementById('tab-tg').classList.remove('active');
            document.getElementById('tab-vk').classList.remove('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            currentActiveData = (tabId === 'tg') ? tgData : vkData;
            
            activeMonth = null;
            showFavoritesOnly = false;
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search').style.display = 'none';
            document.getElementById('sort-select').value = 'newest';
            
            // ЖЕСТКО устанавливаем правильный заголовок ПЕРЕД ЛЮБЫМИ ПРОВЕРКАМИ
            document.getElementById('section-header-text').innerText = (tabId === 'tg') ? 'Клипы из Telegram' : 'Клипы из VK';
            
            // Если вкладка ВК пустая, выводим красивое сообщение
            if (currentActiveData.length === 0) {
                document.getElementById('clips-grid').innerHTML = '<div class="no-results" style="font-size: 16px;">Пока нет клипов 😔<br><span style="font-size:12px;opacity:0.5;display:block;margin-top:8px;">Запустите скрипт обновления на GitHub</span></div>';
                document.getElementById('scroll-sentinel').style.display = 'none';
                document.getElementById('month-filters').innerHTML = '';
                document.getElementById('results-count').innerText = '0 видео';
                return;
            }

            buildFiltersUi();
            applyFilters();
        }

        function openPlayer(iframeUrl) {
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('modal-iframe');
            if(iframeUrl.includes('t.me') && !iframeUrl.includes('embed')) {
                iframeUrl = iframeUrl + '?embed=1&autoplay=1';
            }
            iframe.src = iframeUrl;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; 
        }

        function closePlayer(event) {
            if (event.target.id === 'video-modal' || event.target.classList.contains('modal-close')) {
                document.getElementById('video-modal').classList.remove('show');
                document.getElementById('modal-iframe').src = ''; 
                document.body.style.overflow = ''; 
            }
        }

        function parseViews(viewStr) {
            if (!viewStr) return 0;
            let str = viewStr.toString().toUpperCase().replace(',', '.').trim();
            let num = parseFloat(str);
            if (isNaN(num)) return 0;
            if (str.includes('K')) return num * 1000;
            if (str.includes('M')) return num * 1000000;
            return num;
        }

        function buildFiltersUi() {
            const monthSet = new Set();
            currentActiveData.forEach(clip => {
                if (clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    const monthStr = `${d.getFullYear()}-${d.getMonth()}`;
                    monthSet.add(monthStr);
                }
            });

            const monthContainer = document.getElementById('month-filters');
            monthContainer.innerHTML = `
                <div class="filter-chip" id="fav-filter-btn" onclick="toggleFavoritesFilter()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    Мои сохраненные
                </div>
                <div class="filter-chip active" id="month-all" onclick="setMonthFilter(null)">📅 Все месяцы</div>
            `;
            
            Array.from(monthSet).sort().reverse().forEach(m => {
                const [year, monthIndex] = m.split('-');
                const label = `${monthNames[monthIndex]} ${year}`;
                monthContainer.innerHTML += `<div class="filter-chip" id="month-${m}" onclick="setMonthFilter('${m}')">${label}</div>`;
            });
        }

        function toggleFavorite(event, url) {
            event.preventDefault(); event.stopPropagation();
            const btn = event.currentTarget;
            const index = savedFavorites.indexOf(url);
            if (index > -1) { savedFavorites.splice(index, 1); btn.classList.remove('liked'); } 
            else { savedFavorites.push(url); btn.classList.add('liked'); }
            localStorage.setItem('freshClipsFavorites', JSON.stringify(savedFavorites));
            if (showFavoritesOnly) applyFilters(); 
        }

        function toggleFavoritesFilter() {
            showFavoritesOnly = !showFavoritesOnly;
            const favBtn = document.getElementById('fav-filter-btn');
            document.querySelectorAll('#month-filters .filter-chip:not(#fav-filter-btn)').forEach(el => el.classList.remove('active'));
            if(showFavoritesOnly) { favBtn.classList.add('active'); activeMonth = null; } 
            else { favBtn.classList.remove('active'); activeMonth = null; document.getElementById('month-all').classList.add('active'); }
            applyFilters();
        }

        function shareClip(event, url, title) {
            event.preventDefault(); event.stopPropagation();
            if (navigator.share && window.isSecureContext) {
                navigator.share({ title: title, text: '🔥 Зацени свежий клип!\n', url: url }).catch(() => {});
            } else {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(url).then(() => alert('Ссылка скопирована!')).catch(() => prompt('Скопируйте ссылку:', url));
                } else {
                    let textArea = document.createElement("textarea"); textArea.value = url; textArea.style.position = "fixed"; textArea.style.opacity = 0; document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try { document.execCommand('copy'); alert('Ссылка скопирована!'); } catch (err) { prompt('Скопируйте ссылку:', url); }
                    document.body.removeChild(textArea);
                }
            }
        }

        function setMonthFilter(monthStr) {
            activeMonth = monthStr;
            if(showFavoritesOnly) { showFavoritesOnly = false; document.getElementById('fav-filter-btn').classList.remove('active'); }
            document.querySelectorAll('#month-filters .filter-chip:not(#fav-filter-btn)').forEach(el => el.classList.remove('active'));
            if(monthStr) { document.getElementById(`month-${monthStr}`).classList.add('active'); } 
            else { document.getElementById('month-all').classList.add('active'); }
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const sortMode = document.getElementById('sort-select').value;
            
            filteredClipsData = currentActiveData.filter(clip => {
                const matchesSearch = clip.title.toLowerCase().includes(query);
                let matchesMonth = true;
                if (activeMonth && clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    matchesMonth = (`${d.getFullYear()}-${d.getMonth()}` === activeMonth);
                }
                let matchesFav = true;
                if (showFavoritesOnly) { matchesFav = savedFavorites.includes(clip.url); }
                return matchesSearch && matchesMonth && matchesFav;
            });

            if (sortMode === 'oldest') { filteredClipsData.reverse(); } 
            else if (sortMode === 'az') { filteredClipsData.sort((a, b) => a.title.localeCompare(b.title)); } 
            else if (sortMode === 'popular') { filteredClipsData.sort((a, b) => parseViews(b.views) - parseViews(a.views)); }

            const headerText = document.getElementById('section-header-text');
            if (showFavoritesOnly) { headerText.innerText = 'Мои сохраненные'; }
            else if (query) { headerText.innerText = 'Результаты поиска'; }
            else { headerText.innerText = activeTab === 'tg' ? 'Клипы из Telegram' : 'Клипы из VK'; }

            document.getElementById('clips-grid').innerHTML = '';
            currentDisplayed = 0;
            
            if (filteredClipsData.length === 0) {
                document.getElementById('scroll-sentinel').style.display = 'none';
                document.getElementById('clips-grid').innerHTML = '<div class="no-results">В этом разделе пока ничего нет 😔</div>';
                document.getElementById('results-count').innerText = '0 видео';
            } else {
                document.getElementById('scroll-sentinel').style.display = 'flex';
                renderNextClips();
            }
        }

        function renderNextClips() {
            if (currentDisplayed >= filteredClipsData.length) return; 
            
            const grid = document.getElementById('clips-grid');
            const nextBatch = filteredClipsData.slice(currentDisplayed, currentDisplayed + CLIPS_PER_PAGE);
            document.getElementById('results-count').innerText = `${filteredClipsData.length} видео`;
            
            nextBatch.forEach((clip, index) => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.style.animationDelay = `${index * 0.05}s`; 
                
                card.onclick = () => openPlayer(clip.playerUrl || clip.url);

                const isFav = savedFavorites.includes(clip.url);
                const originalIndex = currentActiveData.indexOf(clip);
                const isDefaultView = !activeMonth && !showFavoritesOnly && document.getElementById('search-input').value === '' && document.getElementById('sort-select').value === 'newest';
                const badgeHtml = (isDefaultView && originalIndex >= 0 && originalIndex < 3) ? '<div class="new-badge">NEW 🔥</div>' : '';

                let viewsHtml = clip.views ? `<div class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> ${clip.views}</div>` : '';
                
                let dateHtml = '';
                if (clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = String(d.getFullYear()).slice(-2); 
                    dateHtml = `<div class="meta-item"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${day}.${month}.${year}</div>`;
                }

                const safeTitle = clip.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                card.innerHTML = `
                    <div class="clip-preview">
                        <img src="${clip.image}" alt="${safeTitle}" class="lazy-image" loading="lazy">
                        ${badgeHtml}
                        <div class="card-actions">
                            <button class="action-icon-btn ${isFav ? 'liked' : ''}" onclick="toggleFavorite(event, '${clip.url}')" title="В избранное">
                                <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </button>
                            <button class="action-icon-btn" onclick="shareClip(event, '${clip.url}', '${safeTitle}')" title="Поделиться">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                            </button>
                        </div>
                        <div class="preview-link">
                            <div class="play-btn">▶</div>
                        </div>
                    </div>
                    <div class="clip-info">
                        <h3>${clip.title}</h3>
                        <div class="meta-info">
                            ${viewsHtml}
                            ${dateHtml}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            currentDisplayed += nextBatch.length;
            if (currentDisplayed >= filteredClipsData.length) { document.getElementById('scroll-sentinel').style.display = 'none'; } 
            else { document.getElementById('scroll-sentinel').style.display = 'flex'; }
        }

        document.getElementById('search-input').addEventListener('input', function() {
            document.getElementById('clear-search').style.display = this.value.trim() ? 'block' : 'none';
            applyFilters();
        });
        function clearSearch() { document.getElementById('search-input').value = ''; document.getElementById('clear-search').style.display = 'none'; applyFilters(); }

        const backToTopBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) { backToTopBtn.classList.add('visible'); } else { backToTopBtn.classList.remove('visible'); }
        });

        loadAllData();
    </script>
</body>
</html>
