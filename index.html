<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram Канал</title>
    <style>
        /* Темная тема с зелеными акцентами */
        :root { 
            --bg-color: #0a0a0c;       
            --card-bg: #222226;        
            --text-main: #ffffff; 
            --text-muted: #93939a; 
            --btn-green: #8cc63f;      
            --btn-green-hover: #7ab32f;
            --accent: #8cc63f;         
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* ======= БЛОК ПРОФИЛЯ (ШАПКА) ======= */
        .profile-header {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 2px solid var(--accent); 
        }

        /* Картинка для ПК */
        .cover-image {
            width: 100%;
            height: 320px; 
            background-color: #000000;
            background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&c_uniq_tag=NWFmbEvYJ29Sw7iJDXKRKD8AWpt3hJgpwRq95Whq6Go&type=cover_group');
            background-size: cover; 
            background-position: center 100%; 
            background-repeat: no-repeat;
        }

        .profile-info {
            padding: 15px 30px 25px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
        }

        .avatar-container { margin-top: -65px; position: relative; }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--card-bg); 
            background-color: #fff;
            object-fit: cover;
        }

        .profile-details { flex-grow: 1; margin-top: 5px; }
        .profile-details h1 { margin: 0; font-size: 26px; font-weight: 600; letter-spacing: 0.5px; }
        .profile-details p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; display: flex; align-items: center; gap: 5px; }

        .profile-actions { display: flex; gap: 12px; margin-top: 10px; }

        .btn {
            padding: 10px 24px;
            border-radius: 25px; 
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            color: #111; 
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .btn-primary, .btn-secondary { background-color: var(--btn-green); }
        .btn-primary:hover, .btn-secondary:hover { 
            background-color: var(--btn-green-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 10px rgba(140, 198, 63, 0.3);
        }

        /* ======= ПОИСК ======= */
        .search-container {
            margin-bottom: 30px;
        }

        #search-input {
            width: 100%;
            padding: 16px 25px;
            border-radius: 30px;
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #search-input::placeholder { color: var(--text-muted); }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(140, 198, 63, 0.2);
        }

        /* ======= СЕТКА КЛИПОВ ======= */
        .section-title { font-size: 20px; margin-bottom: 20px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .clip-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; transition: transform 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .clip-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: rgba(140, 198, 63, 0.3); }
        
        .clip-preview { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background-color: #1a1a1f; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .play-btn { width: 50px; height: 50px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; backdrop-filter: blur(4px); transition: all 0.2s; border: 2px solid transparent; }
        .clip-card:hover .play-btn { background: var(--accent); transform: scale(1.1); border-color: #fff; }
        .clip-info { padding: 12px 15px; }
        .clip-info h3 { margin: 0; font-size: 14px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; color: #e1e1e3; }
        
        .loading, .no-results { text-align: center; padding: 50px; color: var(--text-muted); grid-column: 1 / -1; }

        .load-more-container { text-align: center; margin-top: 40px; margin-bottom: 20px; }
        .btn-load-more { display: none; margin: 0 auto; background-color: var(--card-bg); color: var(--text-main); border: 1px solid var(--accent); padding: 12px 40px; }
        .btn-load-more:hover { background-color: rgba(140, 198, 63, 0.1); color: var(--btn-green); }

        /* ======= АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ ======= */
        @media (max-width: 768px) {
            .cover-image { 
                height: 200px; 
                background-image: url('mobile_cover.png');
                background-size: cover; 
                background-position: center; 
            }
            .profile-info { flex-direction: column; align-items: flex-start; text-align: left; padding: 10px 20px 20px; }
            .avatar-container { margin-top: -60px; } 
            .avatar { width: 90px; height: 90px; } 
            .profile-actions { width: 100%; flex-direction: column; }
            .btn { width: 100%; text-align: center; box-sizing: border-box; }

            /* Делаем клипы в 2 колонки */
            .grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; /* Чуть уменьшаем отступы между карточками */
            }
            /* Делаем текст и кнопку Play компактнее для маленьких карточек */
            .clip-info { padding: 8px 10px; }
            .clip-info h3 { font-size: 12px; }
            .play-btn { width: 36px; height: 36px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="profile-header">
            <div class="cover-image"></div>
            <div class="profile-info">
                <div class="avatar-container">
                    <img src="https://sun23-2.userapi.com/s/v1/ig1/gtuT6ql_Nf9himHpi7tbG0_GbtHlDBzh9WKOg06R07X-1PiFxFI3iRRDn79LnBuwl9uu9Kme.jpg?quality=96&crop=10,0,389,389&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360&ava=1&u=0V8f65eTfV6c6u5lnff4KaBA7t7Dl8e-D_O4z3HU3EUg&cs=100x100" alt="Аватарка" class="avatar">
                </div>
                <div class="profile-details">
                    <h1>Свежие Клипы</h1>
                    <p>✓ Канал в Telegram</p>
                </div>
                <div class="profile-actions">
                    <a href="https://t.me/fresh_clips" target="_blank" class="btn btn-primary">Наш телеграм канал</a>
                    <a href="https://vk.com/fresh_clips" target="_blank" class="btn btn-secondary">Мы в VK</a>
                </div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Поиск по названию клипа...">
        </div>

        <h2 class="section-title">
            Новые клипы
            <span id="results-count" style="font-size: 14px; font-weight: normal; color: var(--text-muted);"></span>
        </h2>
        
        <div class="grid" id="clips-grid">
            <div class="loading" id="loader">Загрузка свежих клипов...</div>
        </div>

        <div class="load-more-container">
            <button class="btn btn-load-more" id="load-more-btn" onclick="renderNextClips()">Показать ещё</button>
        </div>

    </div>

    <script>
        let allClipsData = [];       
        let filteredClipsData = [];  
        let currentDisplayed = 0;    
        const CLIPS_PER_PAGE = 12;   

        async function loadClips() {
            try {
                const response = await fetch('clips.json?' + new Date().getTime());
                allClipsData = await response.json();
                
                filteredClipsData = allClipsData;
                
                document.getElementById('loader').style.display = 'none';
                renderNextClips();
            } catch (error) {
                console.error('Ошибка загрузки клипов:', error);
                document.getElementById('loader').innerText = 'Зайдите в Telegram, чтобы посмотреть новые клипы!';
            }
        }

        function renderNextClips() {
            const grid = document.getElementById('clips-grid');
            const loadMoreBtn = document.getElementById('load-more-btn');
            const resultsCount = document.getElementById('results-count');
            
            if (filteredClipsData.length === 0) {
                grid.innerHTML = '<div class="no-results">По вашему запросу ничего не найдено 😔</div>';
                loadMoreBtn.style.display = 'none';
                resultsCount.innerText = '0 видео';
                return;
            }

            resultsCount.innerText = `${filteredClipsData.length} видео`;

            const nextBatch = filteredClipsData.slice(currentDisplayed, currentDisplayed + CLIPS_PER_PAGE);
            
            nextBatch.forEach(clip => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.innerHTML = `
                    <a href="${clip.url}" target="_blank" style="text-decoration: none;">
                        <div class="clip-preview" style="background-image: url('${clip.image}');">
                            <div class="play-btn">▶</div>
                        </div>
                    </a>
                    <div class="clip-info">
                        <h3>${clip.title}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });

            currentDisplayed += nextBatch.length;

            if (currentDisplayed >= filteredClipsData.length) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'inline-block';
            }
        }

        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            filteredClipsData = allClipsData.filter(clip => 
                clip.title.toLowerCase().includes(query)
            );
            
            document.getElementById('clips-grid').innerHTML = '';
            currentDisplayed = 0;
            
            renderNextClips();
        });

        loadClips();
    </script>
</body>
</html>
