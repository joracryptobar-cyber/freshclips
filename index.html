<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram Канал</title>
    <style>
        /* Основные стили и сочная темная тема */
        :root {
            --bg-color: #0b0914;
            --card-bg: #161224;
            --accent-1: #ff0050; 
            --accent-2: #00f2fe; 
            --text-main: #ffffff;
            --text-muted: #a09eb0;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Шапка сайта */
        header {
            background: linear-gradient(rgba(11, 9, 20, 0.6), rgba(11, 9, 20, 0.95)), 
                        url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&c_uniq_tag=NWFmbEvYJ29Sw7iJDXKRKD8AWpt3hJgpwRq95Whq6Go&type=cover_group') center/cover no-repeat;
            padding: 100px 20px 60px;
            text-align: center;
            border-bottom: 3px solid var(--accent-1);
            box-shadow: 0 5px 25px rgba(255, 0, 80, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 3.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }

        header p {
            font-size: 1.2em;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .tg-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(45deg, var(--accent-2), #0077b5);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .tg-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
        }

        /* Сетка для превью клипов */
        .container {
            max-width: 1300px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 2em;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent-1);
            padding-left: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Карточка клипа */
        .clip-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .clip-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 0, 80, 0.15);
            border-color: rgba(255, 0, 80, 0.3);
        }

        .clip-preview {
            width: 100%;
            height: 400px; 
            background-color: #2a2438;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-main);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            border: 2px solid var(--accent-2);
        }

        .clip-card:hover .play-btn {
            background: var(--accent-1);
            transform: scale(1.1);
            border-color: var(--accent-1);
        }

        .clip-info {
            padding: 15px;
        }

        .clip-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.1em;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .watch-btn {
            display: block;
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-2);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .watch-btn:hover {
            background: rgba(0, 242, 254, 0.1);
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #05040a;
            color: var(--text-muted);
            margin-top: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

        &copy; 2026 Свежие Клипы. Подписывайтесь на <a href="https://t.me/fresh_clips" style="color: var(--accent-2);">@fresh_clips</a>
