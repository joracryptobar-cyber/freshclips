<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свежие Клипы | Telegram и ВКонтакте</title>
    <style>
        :root { --bg-color: #0a0a0c; --card-bg: #222226; --text-main: #ffffff; --text-muted: #93939a; --btn-green: #8cc63f; --accent: #8cc63f; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; }
        .main-wrapper { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; flex-direction: column; min-height: 100vh; }
        .profile-header { background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; border: 2px solid var(--accent); overflow: hidden; }
        .cover-image { width: 100%; height: 320px; background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&type=cover_group'); background-size: cover; background-position: center top; }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 8px; border-radius: 30px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: #111; }
        .sticky-control-panel { position: sticky; top: 0; z-index: 100; background: rgba(10,10,12,0.9); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-sort-row { display: flex; gap: 12px; margin-bottom: 15px; }
        #search-input { flex-grow: 1; padding: 14px 20px; border-radius: 25px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
        .sort-select { padding: 14px 20px; border-radius: 25px; background: var(--card-bg); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .clip-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .clip-preview { aspect-ratio: 16/9; position: relative; }
        .lazy-image { width: 100%; height: 100%; object-fit: cover; }
        .clip-info { padding: 12px 15px; }
        .meta-info { display: flex; justify-content: space-between; font-size: 11px; color: #66666e; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal-content { width: 90%; max-width: 900px; aspect-ratio: 16/9; }
        .modal-iframe { width: 100%; height: 100%; border: none; }
        
        /* DROPDOWN MENU STYLES */
        .filters-scroll-area { display: flex; gap: 8px; padding-bottom: 5px; overflow: visible; }
        .filter-chip { padding: 8px 18px; border-radius: 20px; background: var(--card-bg); font-size: 13px; cursor: pointer; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.05); }
        .filter-chip.active { background: var(--accent); color: #111; font-weight: 600; border-color: var(--accent); }
        
        .month-dropdown-container { position: relative; display: inline-block; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; margin-top: 8px; background: #1a1a1f; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; z-index: 200; display: none; flex-direction: column; min-width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-height: 300px; overflow-y: auto; padding: 8px 0; }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 10px 20px; color: var(--text-muted); cursor: pointer; font-size: 14px; transition: background 0.2s; white-space: nowrap; }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .dropdown-item.active { color: var(--accent); font-weight: 600; background: rgba(140, 198, 63, 0.1); }

        @media (max-width: 768px) {
            .cover-image { height: 160px; background-position: center center; background-image: url('https://sun9-3.userapi.com/impf/DiuXQCGE1N_Wty_HCbV8CoCBdQ3L07UdtuVRwA/thJWeQCYs8I.jpg?size=1920x768&quality=95&crop=26,0,1697,678&sign=d9c1b7989607c18bc3cb14a7521395d3&type=cover_group'); }
            .profile-info { display: grid; grid-template-columns: 1fr auto; grid-template-areas: "avatar ." "details actions"; align-items: end; padding: 10px 15px 15px; gap: 5px 15px; }
            .avatar-container { grid-area: avatar; margin-top: -45px; } 
            .avatar { width: 75px; height: 75px; border-width: 3px; } 
            .profile-details { grid-area: details; margin-top: 0; padding-bottom: 2px; } 
            .profile-details h1 { font-size: 21px; } 
            .profile-details p { font-size: 12px; margin-top: 2px; }
            .profile-actions { grid-area: actions; flex-direction: column; width: 145px; gap: 8px; margin-top: 0; justify-self: end; margin-right: 10%; }
            .btn { width: 100%; padding: 8px 10px; font-size: 11px; gap: 6px; } 
            .search-sort-row { flex-direction: column; gap: 12px; align-items: stretch; }
            .search-wrapper { width: 100%; } 
            .sort-select { width: 100%; min-width: 100%; padding: 14px 20px; } 
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } 
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="profile-header"><div class="cover-image"></div><div style="padding: 20px;"><h1>Свежие Клипы</h1></div></div>
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-tg" onclick="switchTab('tg')">Клипы Telegram</button>
            <button class="tab-btn" id="tab-vk" onclick="switchTab('vk')">VK Видео</button>
        </div>
        <div class="sticky-control-panel">
            <div class="search-sort-row">
                <input type="text" id="search-input" placeholder="Поиск по названию..." oninput="applyFilters()">
                <select id="sort-select" class="sort-select" onchange="applyFilters()">
                    <option value="newest">⏱ Сначала новые</option>
                    <option value="popular">🔥 Популярные</option>
                </select>
            </div>
            <div class="filters-scroll-area" id="month-filters"></div>
        </div>
        <div class="grid" id="clips-grid"></div>
        <div id="scroll-sentinel" style="height: 50px;"></div>
    </div>

    <div id="video-modal" class="modal-overlay" onclick="closePlayer(event)">
        <div class="modal-content"><iframe id="modal-iframe" class="modal-iframe" src="" allowfullscreen></iframe></div>
    </div>

    <script>
        let tgData = [], vkData = [], currentActiveData = [], filteredClipsData = [];
        let currentDisplayed = 0, activeTab = 'tg', activeMonth = null;
        const CLIPS_PER_PAGE = 12;
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        const observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) renderNextClips(); }, { rootMargin: "200px" });

        async function loadAllData() {
            const buster = Date.now();
            try {
                const rTg = await fetch('clips.json?v=' + buster); if(rTg.ok) tgData = await rTg.json();
                const rVk = await fetch('vk_clips.json?v=' + buster); if(rVk.ok) vkData = await rVk.json();
                switchTab('tg');
                observer.observe(document.getElementById('scroll-sentinel'));
            } catch (e) { console.error(e); }
        }

        function switchTab(tabId) {
            activeTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            currentActiveData = (tabId === 'tg') ? tgData : vkData;
            buildFiltersUi();
            applyFilters();
        }

        function buildFiltersUi() {
            const monthSet = new Set();
            currentActiveData.forEach(clip => {
                if (clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    if (!isNaN(d.getTime())) {
                        const mStr = `${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}`;
                        monthSet.add(mStr);
                    }
                }
            });
            const container = document.getElementById('month-filters');
            
            let html = `
            <div class="month-dropdown-container">
                <div class="filter-chip active" id="dropdown-toggle-btn" onclick="toggleDropdown(event)">📅 Все месяцы ▾</div>
                <div class="dropdown-menu" id="dropdown-menu-list">
                    <div class="dropdown-item active" id="m-all" onclick="setMonthFilter(null, '📅 Все месяцы')">📅 Все месяцы</div>
            `;
            
            Array.from(monthSet).sort().reverse().forEach(m => {
                const [y, mi] = m.split('-');
                const label = `${monthNames[parseInt(mi)]} ${y}`;
                html += `<div class="dropdown-item" id="m-${m}" onclick="setMonthFilter('${m}', '${label}')">${label}</div>`;
            });
            
            html += `</div></div>`;
            container.innerHTML = html;
        }

        function toggleDropdown(e) {
            e.stopPropagation();
            document.getElementById('dropdown-menu-list').classList.toggle('show');
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('dropdown-menu-list');
            if (menu && menu.classList.contains('show') && !e.target.closest('.month-dropdown-container')) {
                menu.classList.remove('show');
            }
        });

        function setMonthFilter(m, label) {
            activeMonth = m;
            document.getElementById('dropdown-toggle-btn').innerText = label + ' ▾';
            document.getElementById('dropdown-menu-list').classList.remove('show');
            
            document.querySelectorAll('.dropdown-item').forEach(c => c.classList.remove('active'));
            if(m) {
                const el = document.getElementById(`m-${m}`);
                if(el) el.classList.add('active');
            } else {
                const el = document.getElementById('m-all');
                if(el) el.classList.add('active');
            }
            applyFilters();
        }

        function parseViews(v) {
            let n = parseFloat(v.toString().replace('K','').replace('M',''));
            if (v.toString().includes('K')) return n * 1000;
            if (v.toString().includes('M')) return n * 1000000;
            return n;
        }

        function applyFilters() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;
            
            filteredClipsData = currentActiveData.filter(clip => {
                const matchesSearch = clip.title.toLowerCase().includes(query);
                let matchesMonth = true;
                if (activeMonth && clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    matchesMonth = (`${d.getFullYear()}-${String(d.getMonth()).padStart(2, '0')}` === activeMonth);
                }
                return matchesSearch && matchesMonth;
            });

            if (sort === 'popular') filteredClipsData.sort((a,b) => parseViews(b.views) - parseViews(a.views));
            else filteredClipsData.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

            document.getElementById('clips-grid').innerHTML = '';
            currentDisplayed = 0;
            renderNextClips();
        }

        function renderNextClips() {
            const grid = document.getElementById('clips-grid');
            const batch = filteredClipsData.slice(currentDisplayed, currentDisplayed + CLIPS_PER_PAGE);
            
            batch.forEach(clip => {
                const card = document.createElement('div');
                card.className = 'clip-card';
                card.onclick = () => {
                    const modal = document.getElementById('video-modal');
                    document.getElementById('modal-iframe').src = clip.playerUrl || clip.url;
                    modal.classList.add('show');
                };

                let dateDisplay = clip.dateText || "";
                if (!dateDisplay && clip.timestamp) {
                    const d = new Date(clip.timestamp);
                    dateDisplay = isNaN(d.getTime()) ? clip.timestamp : d.toLocaleDateString('ru-RU');
                }

                card.innerHTML = `
                    <div class="clip-preview"><img src="${clip.image}" class="lazy-image"></div>
                    <div class="clip-info">
                        <h3>${clip.title}</h3>
                        <div class="meta-info">
                            <span>👁 ${clip.views}</span>
                            <span>📅 ${dateDisplay}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            currentDisplayed += batch.length;
        }

        function closePlayer(e) { if(e.target.id === 'video-modal') { document.getElementById('video-modal').classList.remove('show'); document.getElementById('modal-iframe').src = ''; } }
        loadAllData();
    </script>
</body>
</html>
