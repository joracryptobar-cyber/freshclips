name: Обновление Клипов (Без ключей API)

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch:    # Кнопка для ручного запуска

jobs:
  update-clips:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Клонирование репозитория
      uses: actions/checkout@v4

    - name: Настройка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Установка библиотеки для парсинга HTML
      run: npm install cheerio

    - name: Запуск парсера
      run: node update.js

    - name: Сохранение и отправка clips.json на сайт
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add clips.json
        git commit -m "🤖 Авто-обновление: clips.json" || exit 0
        git push
